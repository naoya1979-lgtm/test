<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vampire Survivors Clone - Boss HP Adjusted</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111827; color: white; user-select: none; touch-action: none; font-family: sans-serif; }
        canvas { display: block; image-rendering: pixelated; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }
        .damage-text { position: absolute; color: white; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 0 #000; pointer-events: none; animation: floatUp 0.8s ease-out forwards; }
        @keyframes warningFlash { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        .warning-text { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: #ef4444; font-size: 2rem; font-weight: 900; letter-spacing: 0.2em; text-shadow: 2px 2px 0 #000; pointer-events: none; animation: warningFlash 0.5s ease-in-out 4; opacity: 0; }
        .choice-card:hover { transform: scale(1.02); border-color: #fbbf24; }
    </style>
</head>
<body>
    <div id="ui-layer" class="absolute inset-0 pointer-events-none p-4 flex flex-col justify-between z-10">
        <div class="w-full">
            <div class="flex justify-between text-sm font-bold mb-1 drop-shadow-md">
                <span id="level-text" class="text-yellow-400">Lv 1</span>
                <span id="time-text" class="text-white text-xl">00:00</span>
                <span id="kills-text" class="text-red-400">Kills: 0</span>
            </div>
            <div class="w-full bg-gray-800/80 h-3 rounded-sm border border-gray-600 overflow-hidden shadow-inner relative">
                <div id="xp-bar" class="bg-blue-500 h-full w-0 transition-all duration-200"></div>
                <span id="xp-buff-indicator" class="absolute right-1 top-0 text-[10px] leading-[12px] text-yellow-300 hidden">XP UP!</span>
            </div>
        </div>

        <div id="player-hp-container" class="absolute hidden">
            <div class="w-10 h-1.5 bg-red-900 rounded-sm overflow-hidden border border-black">
                <div id="player-hp-bar" class="bg-red-500 h-full w-full transition-all duration-100"></div>
            </div>
        </div>

        <div id="modal" class="pointer-events-auto absolute inset-0 flex items-center justify-center bg-black/80 backdrop-blur-sm z-20">
            <div class="bg-gray-800 p-8 rounded-lg text-center border-2 border-gray-600 max-w-md w-full shadow-2xl mx-4">
                <h1 id="modal-title" class="text-3xl font-extrabold mb-2 text-white">SURVIVAL PROTOTYPE</h1>
                <p id="modal-desc" class="mb-6 text-gray-400 text-sm">
                    ボスのHPを半減させ、討伐しやすく調整しました。
                </p>
                <div id="stats-container" class="hidden mb-6 text-left bg-gray-900 p-4 rounded text-sm text-gray-300"></div>
                <button id="action-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded transition-colors w-full text-lg">START GAME</button>
            </div>
        </div>

        <div id="levelup-modal" class="pointer-events-auto absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-sm z-30 hidden">
            <div class="bg-gray-900 border-2 border-yellow-500 p-6 rounded-lg max-w-lg w-full shadow-2xl mx-4">
                <h2 class="text-3xl font-bold mb-4 text-yellow-400 text-center tracking-widest text-shadow">LEVEL UP!</h2>
                <div id="levelup-choices" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const uiXpBar = document.getElementById('xp-bar');
        const uiXpBuff = document.getElementById('xp-buff-indicator');
        const uiLevelText = document.getElementById('level-text');
        const uiTimeText = document.getElementById('time-text');
        const uiKillsText = document.getElementById('kills-text');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const statsContainer = document.getElementById('stats-container');
        const actionBtn = document.getElementById('action-btn');
        const levelUpModal = document.getElementById('levelup-modal');
        const levelUpChoicesContainer = document.getElementById('levelup-choices');
        const playerHpContainer = document.getElementById('player-hp-container');
        const playerHpBar = document.getElementById('player-hp-bar');

        let globalGameManager = null;

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        const Utils = {
            distance: (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1),
            checkCollision: (obj1, obj2) => Utils.distance(obj1.x, obj1.y, obj2.x, obj2.y) < (obj1.radius + obj2.radius),
            shuffleArray: (array) => {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }
        };

        class DirectionalWeapon {
            constructor() {
                this.id = 'wpn_directional'; this.name = 'Magic Wand'; this.type = 'weapon'; this.level = 1; this.maxLevel = 5;
                this.cooldown = 45; this.currentCooldown = 0; this.damage = 15; this.speed = 8; this.amount = 1; 
            }
            getDescription() {
                if (this.level === 0) return "移動している方向に魔法弾を発射する。";
                return `[Lv${this.level}->${this.level+1}] ダメージ・弾数・連射速度が上昇する。`;
            }
            upgrade() {
                this.level++; this.damage += 3;
                if (this.level === 3 || this.level === 5) this.amount++;
                this.cooldown = Math.max(15, this.cooldown - 5);
            }
            update(player, entities) {
                this.currentCooldown--;
                if (this.currentCooldown <= 0) {
                    const angle = Math.atan2(player.facing.y, player.facing.x);
                    for (let i = 0; i < this.amount; i++) {
                        const spreadAngle = angle + (i - (this.amount - 1) / 2) * 0.2;
                        const velocity = { x: Math.cos(spreadAngle) * this.speed, y: Math.sin(spreadAngle) * this.speed };
                        entities.projectiles.push(new Projectile(player.x, player.y, velocity, this.damage));
                    }
                    this.currentCooldown = this.cooldown;
                }
            }
            draw(ctx) {}
        }

        class OrbitalWeapon {
            constructor() {
                this.id = 'wpn_orbital'; this.name = 'Holy Light'; this.type = 'weapon'; this.level = 1; this.maxLevel = 5;
                this.balls = []; this.numBalls = 2; this.distance = 60; this.speed = 0.05; this.damagePerFrame = 0.3; this.radius = 8;         
            }
            getDescription() {
                if (this.level === 0) return "プレイヤーの周囲を周回し、触れた敵にダメージを与える。";
                return `[Lv${this.level}->${this.level+1}] 光球の数、威力、回転半径が強化される。`;
            }
            upgrade() {
                this.level++; this.damagePerFrame += 0.1;
                if (this.level % 2 === 0) this.numBalls++;
                this.distance += 5;
            }
            update(player, entities) {
                this.balls = [];
                for (let i = 0; i < this.numBalls; i++) {
                    const angle = (globalGameManager.frame * this.speed) + ((Math.PI * 2 / this.numBalls) * i);
                    const bx = player.x + Math.cos(angle) * this.distance;
                    const by = player.y + Math.sin(angle) * this.distance;
                    const ball = { x: bx, y: by, radius: this.radius };
                    this.balls.push(ball);

                    entities.enemies.forEach(enemy => {
                        if (Utils.checkCollision(ball, enemy)) {
                            enemy.health -= this.damagePerFrame;
                            if (Math.random() < 0.1 && globalGameManager) {
                                globalGameManager.showDamageText(enemy.x, enemy.y - 10, Math.ceil(this.damagePerFrame * 10), '#facc15');
                            }
                        }
                    });
                }
            }
            draw(ctx) {
                this.balls.forEach(b => {
                    ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#facc15'; ctx.fill();
                    ctx.shadowBlur = 15; ctx.shadowColor = '#facc15';
                });
                ctx.shadowBlur = 0; 
            }
        }

        class PassiveCrown {
            constructor() {
                this.id = 'pas_crown'; this.name = 'Crown'; this.type = 'passive'; this.level = 1; this.maxLevel = 5; this.bonusPerLevel = 0.08; 
            }
            getDescription() {
                if (this.level === 0) return "ジェムから得られる経験値が 8% 増加する。";
                return `[Lv${this.level}->${this.level+1}] 獲得経験値ボーナスがさらに +8% される。`;
            }
            upgrade(player) { this.level++; player.xpMultiplier += this.bonusPerLevel; }
            onAcquire(player) { player.xpMultiplier += this.bonusPerLevel; uiXpBuff.classList.remove('hidden'); }
            update() {} draw() {}
        }

        const ITEM_DATABASE = {
            'wpn_directional': () => new DirectionalWeapon(),
            'wpn_orbital': () => new OrbitalWeapon(),
            'pas_crown': () => new PassiveCrown()
        };

        class Player {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 12; this.color = '#3b82f6'; 
                this.maxHealth = 100; this.health = this.maxHealth; this.moveSpeed = 3.5; this.magnet = 60; 
                this.level = 1; this.xp = 0; this.xpRequired = 8; this.xpMultiplier = 1.0; 
                this.facing = { x: 1, y: 0 };
                this.inventory = new Map(); 
                
                const initialWeapon1 = new DirectionalWeapon();
                this.inventory.set(initialWeapon1.id, initialWeapon1);
                const initialWeapon2 = new OrbitalWeapon();
                this.inventory.set(initialWeapon2.id, initialWeapon2);
                
                this.keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
                this.joyX = 0; this.joyY = 0;
            }

            update(entities) {
                let dx = 0; let dy = 0;
                if (this.keys.w || this.keys.ArrowUp) dy -= 1;
                if (this.keys.s || this.keys.ArrowDown) dy += 1;
                if (this.keys.a || this.keys.ArrowLeft) dx -= 1;
                if (this.keys.d || this.keys.ArrowRight) dx += 1;

                dx += this.joyX; dy += this.joyY;

                if (dx !== 0 || dy !== 0) {
                    const length = Math.hypot(dx, dy);
                    dx /= length; dy /= length;
                    this.facing = { x: dx, y: dy };
                }

                this.x += dx * this.moveSpeed;
                this.y += dy * this.moveSpeed;

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                playerHpContainer.style.display = 'block';
                playerHpContainer.style.left = `${this.x - 20}px`;
                playerHpContainer.style.top = `${this.y + 20}px`;
                playerHpBar.style.width = `${Math.max(0, (this.health / this.maxHealth) * 100)}%`;

                this.inventory.forEach(item => { if (typeof item.update === 'function') item.update(this, entities); });
            }

            draw(ctx) {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = '#1e3a8a'; ctx.lineWidth = 2; ctx.stroke();

                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(Math.atan2(this.facing.y, this.facing.x));
                ctx.beginPath(); ctx.moveTo(this.radius + 2, 0); ctx.lineTo(this.radius + 8, -4); ctx.lineTo(this.radius + 8, 4);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.fill(); ctx.restore();

                this.inventory.forEach(item => { if (typeof item.draw === 'function') item.draw(ctx); });
            }

            gainXp(baseAmount, gameManager) {
                this.xp += baseAmount * this.xpMultiplier;
                if (this.xp >= this.xpRequired) {
                    this.xp -= this.xpRequired; 
                    this.level++; this.xpRequired = Math.floor(this.xpRequired * 1.4) + 5; 
                    uiLevelText.innerText = `Lv ${this.level}`;
                    gameManager.triggerLevelUp();
                }
                const progress = Math.min(100, (this.xp / this.xpRequired) * 100);
                uiXpBar.style.width = `${progress}%`;
            }
        }

        class Enemy {
            constructor(x, y, multiplier = 1, isBoss = false) {
                this.x = x; this.y = y; this.isBoss = isBoss; this.radius = isBoss ? 24 : 10;
                this.color = isBoss ? '#9333ea' : '#ef4444'; 
                // ★ ボスのHPを 750 から 375 (半分) に調整
                this.maxHealth = isBoss ? (375 * multiplier) : (15 * multiplier); this.health = this.maxHealth;
                this.moveSpeed = isBoss ? (0.8 + (multiplier * 0.05)) : (1.0 + (multiplier * 0.1));
                this.xpValue = isBoss ? (30 * Math.ceil(multiplier)) : (1 * Math.ceil(multiplier));
            }
            update(player) {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.moveSpeed; this.y += Math.sin(angle) * this.moveSpeed;
            }
            draw(ctx) {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.strokeStyle = this.isBoss ? '#581c87' : '#7f1d1d'; ctx.lineWidth = this.isBoss ? 3 : 1; ctx.stroke();
                if (this.isBoss) {
                    const hpPercent = this.health / this.maxHealth;
                    ctx.fillStyle = '#000'; ctx.fillRect(this.x - 15, this.y - this.radius - 10, 30, 4);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(this.x - 15, this.y - this.radius - 10, 30 * hpPercent, 4);
                }
            }
        }

        class Projectile {
            constructor(x, y, velocity, damage) {
                this.x = x; this.y = y; this.radius = 4; this.color = '#60a5fa'; this.velocity = velocity; this.damage = damage; this.lifeTime = 120;
            }
            update() { this.x += this.velocity.x; this.y += this.velocity.y; this.lifeTime--; }
            draw(ctx) { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.shadowBlur = 10; ctx.shadowColor = this.color; }
        }

        class Gem {
            constructor(x, y, value) {
                this.x = x; this.y = y; this.value = value;
                if (value >= 30) { this.color = '#ef4444'; this.radius = 8; }
                else if (value >= 3) { this.color = '#fbbf24'; this.radius = 6; }
                else { this.color = '#34d399'; this.radius = 4; }
                this.isAttracting = false; 
            }
            update(player) {
                const dist = Utils.distance(this.x, this.y, player.x, player.y);
                if (dist < player.magnet) this.isAttracting = true;
                if (this.isAttracting) {
                    const angle = Math.atan2(player.y - this.y, player.x - this.x);
                    this.x += Math.cos(angle) * 8; this.y += Math.sin(angle) * 8;
                }
            }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(Math.PI / 4); 
                ctx.fillStyle = this.color; ctx.shadowBlur = 5; ctx.shadowColor = this.color;
                ctx.fillRect(-this.radius, -this.radius, this.radius * 2, this.radius * 2); ctx.restore();
            }
        }

        class RecoveryItem {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 7;
                this.color = '#ec4899'; 
                this.recoveryAmount = 20; 
            }
            update(player) {} 
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y);
                ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fillRect(-2, -this.radius, 4, this.radius * 2);
                ctx.fillRect(-this.radius, -2, this.radius * 2, 4);
                ctx.restore();
            }
        }

        class GameManager {
            constructor() {
                this.state = 'TITLE'; this.entities = { player: null, enemies: [], projectiles: [], gems: [], items: [] };
                this.frame = 0; this.startTime = 0; this.gameTime = 0; this.kills = 0; this.enemySpawnRate = 60; this.lastBossSpawnTime = 0; this.levelUpQueue = 0;
                this.touchStartPos = { x: 0, y: 0 }; this.touchCurrentPos = { x: 0, y: 0 }; this.isTouching = false;
                this.animationId = null; 
                globalGameManager = this; this.setupInputs();
            }

            setupInputs() {
                window.addEventListener('keydown', (e) => { if (this.entities.player) this.entities.player.keys[e.key] = true; });
                window.addEventListener('keyup', (e) => { if (this.entities.player) this.entities.player.keys[e.key] = false; });

                canvas.addEventListener('touchstart', (e) => {
                    if (this.state === 'LEVELUP') return; e.preventDefault(); 
                    if (this.state !== 'PLAYING' || !this.entities.player) return;
                    this.isTouching = true;
                    this.touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                    this.touchCurrentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }, { passive: false });

                canvas.addEventListener('touchmove', (e) => {
                    if (this.state === 'LEVELUP') return; e.preventDefault();
                    if (!this.isTouching || !this.entities.player) return;
                    this.touchCurrentPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                    const dx = this.touchCurrentPos.x - this.touchStartPos.x;
                    const dy = this.touchCurrentPos.y - this.touchStartPos.y;
                    this.entities.player.joyX = Math.max(-1, Math.min(1, dx / 40));
                    this.entities.player.joyY = Math.max(-1, Math.min(1, dy / 40));
                }, { passive: false });

                const endTouch = (e) => {
                    if (this.state === 'LEVELUP') return; e.preventDefault();
                    this.isTouching = false;
                    if (this.entities.player) { this.entities.player.joyX = 0; this.entities.player.joyY = 0; }
                };
                canvas.addEventListener('touchend', endTouch, { passive: false });
                canvas.addEventListener('touchcancel', endTouch, { passive: false });

                actionBtn.addEventListener('click', () => { if (this.state === 'TITLE' || this.state === 'GAMEOVER') this.startGame(); });
            }

            startGame() {
                this.state = 'PLAYING'; modal.classList.add('hidden'); uiXpBuff.classList.add('hidden');
                this.entities.player = new Player(canvas.width / 2, canvas.height / 2);
                this.entities.enemies = []; this.entities.projectiles = []; this.entities.gems = []; this.entities.items = []; 
                this.frame = 0; this.startTime = Date.now(); this.gameTime = 0; this.kills = 0; this.lastBossSpawnTime = 0; this.levelUpQueue = 0;
                uiXpBar.style.width = '0%'; uiLevelText.innerText = 'Lv 1'; uiKillsText.innerText = 'Kills: 0';
                
                if (this.animationId !== null) { cancelAnimationFrame(this.animationId); }
                this.loop();
            }

            gameOver() {
                this.state = 'GAMEOVER'; playerHpContainer.style.display = 'none';
                modalTitle.innerText = 'GAME OVER'; modalTitle.className = 'text-3xl font-extrabold mb-2 text-red-500'; modalDesc.innerText = '無念...';
                statsContainer.classList.remove('hidden');
                statsContainer.innerHTML = `
                    <div class="flex justify-between border-b border-gray-700 pb-1 mb-1"><span>生存時間:</span> <span class="font-bold text-white">${uiTimeText.innerText}</span></div>
                    <div class="flex justify-between border-b border-gray-700 pb-1 mb-1"><span>到達レベル:</span> <span class="font-bold text-white">${this.entities.player.level}</span></div>
                    <div class="flex justify-between"><span>討伐数:</span> <span class="font-bold text-white">${this.kills} 体</span></div>`;
                actionBtn.innerText = 'TRY AGAIN'; modal.classList.remove('hidden');
            }

            triggerLevelUp() { this.levelUpQueue++; if (this.state === 'PLAYING') this.processLevelUp(); }

            processLevelUp() {
                this.state = 'LEVELUP';
                if (this.entities.player) { this.entities.player.joyX = 0; this.entities.player.joyY = 0; this.isTouching = false; }
                this.levelUpQueue--; this.showLevelUpUI();
            }

            showLevelUpUI() {
                levelUpChoicesContainer.innerHTML = ''; 
                const player = this.entities.player; const candidates = [];
                for (const [id, factory] of Object.entries(ITEM_DATABASE)) {
                    if (player.inventory.has(id)) {
                        const item = player.inventory.get(id);
                        if (item.level < item.maxLevel) candidates.push({ id: id, itemObj: item, isNew: false });
                    } else {
                        const dummyItem = factory(); dummyItem.level = 0;
                        candidates.push({ id: id, itemObj: dummyItem, isNew: true });
                    }
                }

                Utils.shuffleArray(candidates); const selectedChoices = candidates.slice(0, 3);
                if (selectedChoices.length === 0) {
                    player.health = Math.min(player.maxHealth, player.health + 30);
                    this.resumeFromLevelUp(); return;
                }

                selectedChoices.forEach(choice => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-card w-full bg-gray-800 p-4 rounded border border-gray-600 text-left transition-all cursor-pointer flex flex-col gap-1';
                    const header = document.createElement('div'); header.className = 'flex justify-between items-center';
                    const nameSpan = document.createElement('span'); nameSpan.className = 'text-xl font-bold ' + (choice.itemObj.type === 'weapon' ? 'text-blue-400' : 'text-green-400'); nameSpan.innerText = choice.itemObj.name;
                    const typeSpan = document.createElement('span'); typeSpan.className = 'text-xs font-semibold px-2 py-1 rounded bg-gray-700 text-gray-300'; typeSpan.innerText = choice.isNew ? 'NEW' : `Lv ${choice.itemObj.level} -> ${choice.itemObj.level + 1}`;
                    header.appendChild(nameSpan); header.appendChild(typeSpan);
                    const desc = document.createElement('p'); desc.className = 'text-sm text-gray-400 mt-2'; desc.innerText = choice.itemObj.getDescription();
                    btn.appendChild(header); btn.appendChild(desc);
                    btn.onclick = () => this.selectItem(choice);
                    levelUpChoicesContainer.appendChild(btn);
                });
                levelUpModal.classList.remove('hidden');
            }

            selectItem(choice) {
                const player = this.entities.player;
                if (choice.isNew) {
                    const newItem = ITEM_DATABASE[choice.id]();
                    player.inventory.set(newItem.id, newItem);
                    if (typeof newItem.onAcquire === 'function') newItem.onAcquire(player);
                } else {
                    const item = player.inventory.get(choice.id);
                    if (typeof item.upgrade === 'function') item.upgrade(player);
                }
                levelUpModal.classList.add('hidden'); this.resumeFromLevelUp();
            }

            resumeFromLevelUp() {
                if (this.levelUpQueue > 0) { this.processLevelUp(); } 
                else { this.state = 'PLAYING'; this.startTime = Date.now() - (this.gameTime * 1000); }
            }

            spawnEnemy(isBoss = false) {
                const multiplier = 1 + (this.gameTime / 60); let x, y;
                if (isBoss) {
                    const angle = Math.random() * Math.PI * 2; const distance = Math.max(canvas.width, canvas.height) / 2 + 50;
                    x = this.entities.player.x + Math.cos(angle) * distance; y = this.entities.player.y + Math.sin(angle) * distance;
                } else {
                    if (Math.random() < 0.5) { x = Math.random() < 0.5 ? -30 : canvas.width + 30; y = Math.random() * canvas.height; } 
                    else { x = Math.random() * canvas.width; y = Math.random() < 0.5 ? -30 : canvas.height + 30; }
                }
                this.entities.enemies.push(new Enemy(x, y, multiplier, isBoss));
                this.enemySpawnRate = Math.max(10, 60 - Math.floor(this.gameTime / 10));
            }

            showDamageText(x, y, text, color = 'white') {
                const el = document.createElement('div'); el.className = 'damage-text'; el.innerText = text; el.style.left = `${x}px`; el.style.top = `${y}px`; el.style.color = color; document.body.appendChild(el); setTimeout(() => { el.remove(); }, 800);
            }

            showWarningUI() {
                const el = document.createElement('div'); el.className = 'warning-text'; el.innerText = 'WARNING: BOSS APPROACHING!'; document.body.appendChild(el); setTimeout(() => { el.remove(); }, 2000);
            }

            update() {
                if (this.state !== 'PLAYING') return;
                this.frame++;
                const elapsedSec = Math.floor((Date.now() - this.startTime) / 1000);
                this.gameTime = elapsedSec;
                const m = String(Math.floor(elapsedSec / 60)).padStart(2, '0'); const s = String(elapsedSec % 60).padStart(2, '0');
                uiTimeText.innerText = `${m}:${s}`;

                if (this.gameTime > 0 && this.gameTime % 30 === 0 && this.gameTime !== this.lastBossSpawnTime) {
                    this.spawnEnemy(true); this.showWarningUI(); this.lastBossSpawnTime = this.gameTime;
                }

                if (this.frame % this.enemySpawnRate === 0) this.spawnEnemy(false);

                const player = this.entities.player; player.update(this.entities);

                for (let i = this.entities.projectiles.length - 1; i >= 0; i--) {
                    let proj = this.entities.projectiles[i]; proj.update();
                    if (proj.lifeTime <= 0 || proj.x < 0 || proj.x > canvas.width || proj.y < 0 || proj.y > canvas.height) { this.entities.projectiles.splice(i, 1); continue; }
                    let hit = false;
                    for (let j = this.entities.enemies.length - 1; j >= 0; j--) {
                        let enemy = this.entities.enemies[j];
                        if (Utils.checkCollision(proj, enemy)) { enemy.health -= proj.damage; this.showDamageText(enemy.x, enemy.y - 10, proj.damage); hit = true; break; }
                    }
                    if (hit) this.entities.projectiles.splice(i, 1);
                }

                for (let i = this.entities.enemies.length - 1; i >= 0; i--) {
                    let enemy = this.entities.enemies[i]; enemy.update(player);
                    if (Utils.checkCollision(enemy, player)) {
                        const dmg = enemy.isBoss ? 2.0 : 0.5; player.health -= dmg; 
                        if (player.health <= 0) { this.gameOver(); return; }
                    }
                }

                for (let i = this.entities.enemies.length - 1; i >= 0; i--) {
                    let enemy = this.entities.enemies[i];
                    if (enemy.health <= 0) {
                        this.entities.gems.push(new Gem(enemy.x, enemy.y, enemy.xpValue));
                        if (Math.random() < 0.01) {
                            this.entities.items.push(new RecoveryItem(enemy.x + (Math.random() * 20 - 10), enemy.y + (Math.random() * 20 - 10)));
                        }
                        this.entities.enemies.splice(i, 1); this.kills++; uiKillsText.innerText = `Kills: ${this.kills}`;
                    }
                }

                for (let i = this.entities.gems.length - 1; i >= 0; i--) {
                    let gem = this.entities.gems[i]; gem.update(player);
                    if (Utils.distance(gem.x, gem.y, player.x, player.y) < player.radius + gem.radius) { player.gainXp(gem.value, this); this.entities.gems.splice(i, 1); }
                }

                for (let i = this.entities.items.length - 1; i >= 0; i--) {
                    let item = this.entities.items[i];
                    if (Utils.distance(item.x, item.y, player.x, player.y) < player.radius + item.radius) { 
                        player.health = Math.min(player.maxHealth, player.health + item.recoveryAmount);
                        this.showDamageText(player.x, player.y - 20, `+${item.recoveryAmount}`, '#4ade80'); 
                        this.entities.items.splice(i, 1); 
                    }
                }
            }

            drawJoystick() {
                if (!this.isTouching) return;
                ctx.save(); ctx.globalAlpha = 0.3;
                ctx.beginPath(); ctx.arc(this.touchStartPos.x, this.touchStartPos.y, 50, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
                let dx = this.touchCurrentPos.x - this.touchStartPos.x; let dy = this.touchCurrentPos.y - this.touchStartPos.y;
                const dist = Math.hypot(dx, dy); const maxDist = 50;
                if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }
                ctx.beginPath(); ctx.arc(this.touchStartPos.x + dx, this.touchStartPos.y + dy, 25, 0, Math.PI * 2); ctx.fillStyle = '#60a5fa'; ctx.fill();
                ctx.restore();
            }

            draw() {
                ctx.fillStyle = '#111827'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                if (this.state === 'TITLE' || this.state === 'GAMEOVER') return;
                ctx.shadowBlur = 0;
                this.entities.items.forEach(item => item.draw(ctx)); 
                this.entities.gems.forEach(gem => gem.draw(ctx));
                this.entities.enemies.filter(e => !e.isBoss).forEach(e => e.draw(ctx));
                this.entities.enemies.filter(e => e.isBoss).forEach(e => e.draw(ctx));
                this.entities.projectiles.forEach(proj => proj.draw(ctx));
                this.entities.player.draw(ctx);
                this.drawJoystick();
            }

            loop() { 
                this.update(); 
                this.draw(); 
                this.animationId = requestAnimationFrame(() => this.loop()); 
            }
        }

        const game = new GameManager();
    </script>
